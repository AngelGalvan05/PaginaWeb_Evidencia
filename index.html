<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
    <title>TechMarket - Tu Tienda TI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
  <h2>Iniciar Sesión</h2>

  <input type="email" id="email" placeholder="Correo">
  <input type="password" id="password" placeholder="Contraseña">

  <button onclick="login()">Entrar</button>
  <button onclick="register()">Registrarse</button>

  <p id="mensaje"></p>
    </div>
    <header class="header">
        <div class="logo">TechMarket</div>
        <div class="search-bar">
            <input type="text" placeholder="Buscar componentes, licencias y más...">
            <button>Buscar</button>
        </div>
        <div class="cart">🛒 Carrito (0)</div>
    </header>
    <button id="btn-subir-datos" onclick="subirProductosIniciales()" style="padding:15px; background:red; color:white; width:100%;">Subir BD Inicial (Clic solo una vez)</button>

    <div class="main-container">
        
        <aside class="sidebar">
            <h3>Categorías</h3>
            <ul class="filter-list">
                <li><label><input type="radio" name="categoria" value="todos" checked> Todos</label></li>
                <li><label><input type="radio" name="categoria" value="hardware"> Hardware</label></li>
                <li><label><input type="radio" name="categoria" value="electronica"> Electrónica</label></li>
                <li><label><input type="radio" name="categoria" value="servicios"> Servicios</label></li>
            </ul>
        </aside>

        <main class="product-grid" id="catalogo">
            
            <div class="product-card" data-categoria="hardware">
                <div class="product-image">💻</div>
                <div class="product-info">
                    <span class="category-tag">Hardware</span>
                    <h4 class="product-title">Tarjeta de Video RTX 4060</h4>
                    <p class="product-price">$6,500.00</p>
                    <button class="btn-details">Ver detalles</button>
                </div>
            </div>

            <div class="product-card" data-categoria="electronica">
                <div class="product-image">🔌</div>
                <div class="product-info">
                    <span class="category-tag">Electrónica</span>
                    <h4 class="product-title">Kit Arduino Master</h4>
                    <p class="product-price">$1,200.00</p>
                    <button class="btn-details">Ver detalles</button>
                </div>
            </div>

            <div class="product-card" data-categoria="servicios">
                <div class="product-image">🛡️</div>
                <div class="product-info">
                    <span class="category-tag">Servicios TI</span>
                    <h4 class="product-title">Auditoría de Seguridad Web</h4>
                    <p class="product-price">$3,000.00</p>
                    <button class="btn-details">Ver detalles</button>
                </div>
            </div>

        </main>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. REEMPLAZA ESTO CON TUS LLAVES (Las que copiaste de la consola de Firebase)
        const firebaseConfig = {
            apiKey: "AIzaSyCvxilsuHcDCynIDoaAbNBCvoY47OCuv0g",
            authDomain: "paginawebuanlevidencia.firebaseapp.com",
            projectId: "paginawebuanlevidencia",
            storageBucket: "paginawebuanlevidencia.firebasestorage.app",
            messagingSenderId: "333532326502",
            appId: "1:333532326502:web:6e98985eaf107d4cc01ba7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ====================================================================
        // SCRIPT TEMPORAL PARA SUBIR PRODUCTOS (Solo lo usarás tú como Admin)
        // ====================================================================
        window.subirProductosIniciales = async function() {
            const boton = document.getElementById("btn-subir-datos");
            boton.innerText = "Subiendo...";
            boton.disabled = true;

            // Aquí defines los productos que quieres meter a tu base de datos
            const productosPrueba = [
                
                { nombre: "Kit Arduino Master", precio: 1200, categoria: "Electrónica", imagenUrl: "https://tse1.mm.bing.net/th/id/OIP.C7Z7kvkyBuvXO3iJ4nkeywHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" },
                { nombre: "Memoria RAM 2 x 32 GB DDR5", precio: 6000, categoria: "Hardware", imagenUrl: "https://media.ldlc.com/r1600/ld/products/00/05/98/21/LD0005982195_0005982231_0005982241.jpg" },
                { nombre: "Módulo WiFi ESP32", precio: 350, categoria: "Electrónica", imagenUrl: "https://laelectronica.com.gt/image/cache/catalog/Productos/Arduinos/ESP32S-CH340-1-1200x1200.jpeg" },
                { nombre: "Laptop HP", precio: 10000, categoria: "Hardware", imagenUrl: "https://tse2.mm.bing.net/th/id/OIP.xc3VPrHAf1glk5l_GSbvKQHaF2?rs=1&pid=ImgDetMain&o=7&rm=3" }
            ];

            try {
                for (let prod of productosPrueba) {
                    await addDoc(collection(db, "productos"), prod);
                    console.log("Subido a Firebase:", prod.nombre);
                }
                alert("¡Base de datos poblada con éxito! Revisa tu consola de Firebase.");
                cargarProductos(); // Recargamos la vista para que aparezcan
                boton.style.display = "none"; // Ocultamos el botón tras usarlo
            } catch (error) {
                console.error("Error al subir:", error);
                alert("Hubo un error, revisa la consola (F12). ¿Activaste las reglas de prueba?");
            }
        };

        // ====================================================================
        // FUNCIÓN PARA MOSTRAR LOS PRODUCTOS EN PANTALLA
        // ====================================================================
        async function cargarProductos() {
            const contenedorCatalogo = document.getElementById("catalogo");
            try {
                const querySnapshot = await getDocs(collection(db, "productos"));
                contenedorCatalogo.innerHTML = ""; // Limpiamos los productos de prueba

                querySnapshot.forEach((doc) => {
                    const producto = doc.data();
                    contenedorCatalogo.innerHTML += `
                        <div class="product-card" data-categoria="${producto.categoria.toLowerCase()}">
                            <div class="product-image">
                                <img src="${producto.imagenUrl}" alt="${producto.nombre}" style="width:100%; height:100%; object-fit:contain; padding:10px;">
                            </div>
                            <div class="product-info">
                                <span class="category-tag">${producto.categoria}</span>
                                <h4 class="product-title">${producto.nombre}</h4>
                                <p class="product-price">$${producto.precio}</p>
                                <button class="btn-details">Ver detalles</button>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Error al cargar:", error);
            }
        }

        // Cargamos los productos apenas se abre la página
        cargarProductos();

        // Funciones temporales para que no marque error el HTML de tu compañero
        window.login = function() { console.log("Login pendiente por otro dev"); };
        window.register = function() { console.log("Registro pendiente"); };
    </script>
</body>
</html>
</body>
</html>
</body>
</html>
